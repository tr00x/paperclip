name: mailpit
services:
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
      - "1143:1143"   # IMAP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_IMAP_BIND_ADDR: "0.0.0.0:1143"
      MP_IMAP_AUTH_ACCEPT_ANY: 1
      MP_IMAP_AUTH_ALLOW_INSECURE: 1
