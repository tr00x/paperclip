    role: ceo
    title: Chief AI Officer
    icon: crown
    capabilities: "Координация штаба, приоритизация, еженедельные отчёты, Telegram эскалации"
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    runtime:
      heartbeat:
        intervalSec: 1800
        wakeOnAssignment: true
        wakeOnOnDemand: true
        timeoutSec: 900
    permissions:
